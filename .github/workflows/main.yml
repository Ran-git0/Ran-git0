name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
    - name: Generate metrics
      uses: lowlighter/metrics@latest
      with:
        token: ${{ secrets.METRICS_TOKEN }}
        user: Ran-git0
        filename: github-metrics.svg
        template: default
        base: header, metadata
        use_prebuilt_image: true
        debug: true
        plugin_introduction: true
        plugin_introduction_title: false
        plugin_gists: true
        plugin_activity: true
        plugin_activity_limit: 6
        plugin_activity_days: 14
        plugin_languages: true
        plugin_languages_sections: most-used,recently-used
        plugin_languages_indepth: false
        plugin_languages_limit: 8
        plugin_topics: true
        plugin_topics_mode: starred
        plugin_topics_sort: starred
        plugin_topics_limit: 12
        plugin_steam: true
        plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
        plugin_steam_user: "71D6C3C8B64FC8D6A36596E422E827DD"
        plugin_steam_sections: player-most-played-recently-played
        plugin_steam_games_limit: 2
        plugin_steam_recent_games_limit: 2
        plugin_steam_achievements_limit: 3
