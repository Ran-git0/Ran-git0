name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["master", "main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics (ran-terminal + steam)
        uses: Ran-git0/metrics@main
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ran-git0

          # output file in your profile repo
          filename: metrics.svg

          # your custom template folder name (use exact folder name under source/templates)
          template: ran-terminal

          base: header, metadata

          # Steam plugin
          plugin_steam: yes
          plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
          plugin_steam_user: "76561198042365119"
          plugin_steam_sections: player, most-played, recently-played
          plugin_steam_games_limit: 2
          plugin_steam_recent_games_limit: 2
          plugin_steam_achievements_limit: 3
